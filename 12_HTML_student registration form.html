<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration form</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="MOTHERNAME">MOTHERS NAME:</label>
        <input type="text" id="MOTHERNAME" name="MOTHERNAME" required>
        <br><br>

        <label for="FATHERSNAME">FATHERS NAME:</label>
        <input type="text" id="FATHERSNAME" name="FATHERSNAME" required>
        <br><br>

        <label for="EMAIL">EMAIL:</label>
        <input type="email" id="EMAIL" name="EMAIL" required>
        <br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required>
        <br><br>

        <label for="GENDER">Date of GENDER:</label>
        <input type="GENDER" id="GENDER" name="GENDER" required>
                 <option value="male">Male</option>
                 <option value="female">Female</option>
        <br><br>

        <label for="DATEBIRTH">Date of Birth:</label>
        <input type="date" id="DATEBIRTH" name="DATEBIRTH" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label for="COURSE">COURSE:</label>
        <select id="COURSE" name="COURSE" required>
            <option value="">Select a course</option>
            <option value="CE">CE</option>
            <option value="ME">ME</option>
            <option value="EJ">EJ</option>
            <option value="EE">EE</option>
        </select>
        <br><br>

        <label for="ADDRESS">ADDRESS:</label>
        <textarea id="ADDRESS" name="ADDRESS" rows="4" cols="50" required></textarea>
        <br><br>

        <label for="hobbies">Hobbies:</label>
        <input type="text" id="hobbies" name="hobbies" required>
        <br><br>

        <label for="UPLOAD PHOTO">UPLOAD PHOTO:</label>
        <input type="file" id="UPLOAD PHOTO" name="UPLOAD PHOTO" accept="image/*" required>
        <br><br>


        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
