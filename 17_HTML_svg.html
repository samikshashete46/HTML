<!DOCTYPE html>
<html>
<head>
    <title>SVG Plant</title>
</head>
<body>

<h2>SVG Plant Example</h2>

<svg width="200" height="250">

    <!-- Stem -->
    <line x1="100" y1="200" x2="100" y2="100"
          stroke="green" stroke-width="6"/>

    <!-- Leaves -->
    <ellipse cx="80" cy="140" rx="20" ry="10"
             fill="lightgreen"/>
    <ellipse cx="120" cy="160" rx="20" ry="10"
             fill="lightgreen"/>

    <!-- Flower -->
    <circle cx="100" cy="80" r="15" fill="yellow"/>

    <circle cx="85" cy="65" r="12" fill="pink"/>
    <circle cx="115" cy="65" r="12" fill="pink"/>
    <circle cx="85" cy="95" r="12" fill="pink"/>
    <circle cx="115" cy="95" r="12" fill="pink"/>

</svg>

</body>
</html>
